<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Magic Link</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0f;">
    <tr>
      <td align="center" style="padding:0;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Hero Image -->
          <tr>
            <td style="padding:0;position:relative;">
              <div style="background:linear-gradient(135deg,#6366F1 0%,#8B5CF6 40%,#EC4899 70%,#F59E0B 100%);height:280px;border-radius:0 0 24px 24px;display:flex;align-items:center;justify-content:center;">
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center" style="padding-top:80px;">
                      <div style="font-size:80px;line-height:1;">&#x1F3B2;</div>
                    </td>
                  </tr>
                </table>
              </div>
            </td>
          </tr>

          <!-- Logo -->
          <tr>
            <td align="center" style="padding:30px 0 0 0;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:linear-gradient(135deg,#6366F1,#8B5CF6);width:48px;height:48px;border-radius:12px;text-align:center;vertical-align:middle;font-size:24px;font-weight:bold;color:#ffffff;line-height:48px;">
                    B
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td align="center" style="padding:24px 40px 0 40px;">
              <h1 style="margin:0;font-size:42px;font-weight:700;color:#ffffff;font-style:italic;letter-spacing:-1px;">
                Your magic link
              </h1>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding:32px 40px 0 40px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-radius:50px;background:linear-gradient(135deg,#6366F1,#8B5CF6,#a78bfa);padding:1px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 40px;border-radius:50px;background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;letter-spacing:0.5px;">
                      Click here to sign in
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Subtext -->
          <tr>
            <td align="center" style="padding:28px 50px 0 50px;">
              <p style="margin:0;font-size:15px;line-height:1.6;color:rgba(255,255,255,0.55);font-style:italic;">
                This link will only be valid for the next 5 minutes. If the link does not work, you can request a new one from the app.
              </p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:40px 60px 0 60px;">
              <div style="height:1px;background:rgba(255,255,255,0.08);"></div>
            </td>
          </tr>

          <!-- Team -->
          <tr>
            <td align="center" style="padding:28px 40px 0 40px;">
              <p style="margin:0;font-size:16px;font-weight:600;color:rgba(255,255,255,0.7);font-style:italic;">
                The BetBuddys Team
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:12px 40px 0 40px;">
              <p style="margin:0;font-size:13px;color:rgba(255,255,255,0.3);">
                BetBuddys &copy; 2026 &mdash; Fake money bets with friends
              </p>
            </td>
          </tr>

          <!-- Links -->
          <tr>
            <td align="center" style="padding:20px 40px 0 40px;">
              <a href="https://betbuddys.io" style="font-size:14px;color:rgba(255,255,255,0.4);text-decoration:none;margin:0 12px;font-style:italic;">Website</a>
              <a href="https://swarn2099.github.io/BetBuddy/privacy-policy.html" style="font-size:14px;color:rgba(255,255,255,0.4);text-decoration:none;margin:0 12px;font-style:italic;">Privacy</a>
            </td>
          </tr>

          <!-- Bottom spacing -->
          <tr>
            <td style="padding:40px 0;"></td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
